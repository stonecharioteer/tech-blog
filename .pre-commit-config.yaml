minimum_pre_commit_version: "3.7.0"
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: local
    hooks:
      - id: mdformat
        name: Format staged Markdown
        entry: bash -lc 'uvx --from mdformat-gfm mdformat "$@"' --
        language: system
        types_or: [markdown]

      - id: validate-tags
        name: Validate post tags
        entry: python3 scripts/validate_tags.py
        language: system
        files: ^content/.*\.md$
        pass_filenames: false

      - id: reject-claude-coauthor
        name: Reject Claude co-author trailers
        entry: >-
          bash -lc 'msg_file="$1";
          if grep -Eiq "^[[:space:]]*Co-authored-by:[[:space:]]*.*(claude|anthropic)" "$msg_file"; then
            echo "Commit message must not include Claude/Anthropic Co-authored-by trailers.";
            exit 1;
          fi;
          if grep -Eiq "^[[:space:]]*Generated with[[:space:]]+.*claude" "$msg_file"; then
            echo "Commit message must not include Claude generation footers.";
            exit 1;
          fi;
          exit 0' --
        language: system
        stages: [commit-msg]

      - id: conventional-commit
        name: Check conventional commit message
        entry: >-
          bash -lc 'msg_file="$1";
          pattern="^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([[:alnum:]_.-]+\\))?(!)?: .+";
          if grep -Eq "$pattern" "$msg_file"; then
            exit 0;
          fi;
          echo "Commit message must use Conventional Commits, e.g. feat(blog): add post";
          exit 1' --
        language: system
        stages: [commit-msg]
